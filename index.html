<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D House</title>

<!-- Include Lexend font -->
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Lexend', sans-serif;
    font-weight: 600;
    background: linear-gradient(to bottom, #2c2c2c, #000);
    color: white;
    text-align: center;
}

/* Header */
.header {
    margin-top: 30px;
}

.header h1 {
    margin: 5px;
    font-size: 60px; /* Bigger title */
}

.header p {
    margin: 5px;
    font-size: 22px; /* Subtitle slightly bigger */
}

/* Example images row */
.examples {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    margin: 20px;
}

.examples img {
    width: 70px;
    height: 70px;
    border-radius: 15px;
    object-fit: cover;
}

/* Section title */
.section-title {
    font-size: 36px; /* Slightly bigger section title */
    margin-top: 20px;
}

/* Products */
.products {
    display: flex;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
    margin-top: 20px;
}

.product img {
    width: 120px;
    height: 120px;
    border-radius: 20px;
    object-fit: cover;
}

.product p {
    margin-top: 10px;
}

/* Big text */
.big-text {
    font-size: 40px; /* Bigger big text */
    font-weight: 600;
    margin: 20px 0;
}

/* Buttons */
.btn {
    display: inline-block;
    padding: 15px 25px; /* Slightly bigger buttons */
    margin: 10px;
    border-radius: 25px;
    color: white;
    text-decoration: none;
    font-weight: 600;
    font-family: 'Lexend', sans-serif;
}

/* Button colors */
.messenger {
    background: #0084ff;
}

.facebook {
    background: #1877f2;
}

/* Email text */
.email {
    margin-top: 15px;
    font-size: 18px;
}

.email a {
    color: #ffffff;
    text-decoration: none;
    font-family: 'Lexend', sans-serif;
    font-weight: 600;
}
</style>

</head>
<body>

<!-- Header -->
<div class="header">
    <h1>3D HOUSE</h1>
    <p>Where YOUR prints come to life!</p>
</div>

<h3>Examples of what we print!</h3>

<!-- Small Images -->
<div class="examples">
    <img src="dog.jpg">
    <img src="cat.jpg">
    <img src="snail.jpg">
    <img src="seal.jpg">
    <img src="axolotl.jpg">
</div>

<h2 class="section-title">Animals</h2>

<!-- Products -->
<div class="products">
    <div class="product">
        <img src="stand.jpg">
        <p>Headphone Stands</p>
    </div>

    <div class="product">
        <img src="shelf.jpg">
        <p>Mini Shelves</p>
    </div>

    <div class="product">
        <img src="oreo.jpg">
        <p>Magnet Fidgets</p>
    </div>
</div>

<div class="big-text">And More!</div>

<h3>CREATE YOUR 3D PRINT HERE!</h3>
<p>Contact us here!<br>And get your prints!</p>

<a href="https://www.facebook.com/profile.php?id=61582165801375" target="_blank" class="btn facebook">Facebook</a>

<!-- Updated Email Section -->
<p class="email">
    Gmail: <a href="https://mail.google.com/mail/?view=cm&fs=1&to=konstantinezedgina@gmail.com" target="_blank">konstantinezedgina@gmail.com</a><br>
    <a href="https://mail.google.com/mail/?view=cm&fs=1&to=demezedginidze@gmail.com" target="_blank">demezedginidze@gmail.com</a>
</p>

</body>
</html>
