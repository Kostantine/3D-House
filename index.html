<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D House</title>

<!-- Include Lexend font -->
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Lexend', sans-serif;
    font-weight: 600;
    background: linear-gradient(to bottom, #2c2c2c, #000);
    color: white;
    text-align: center;
}

/* Header */
.header {
    margin-top: 30px;
}

.header h1 {
    margin: 5px;
    font-size: 60px; /* Bigger title */
}

.header p {
    margin: 5px;
    font-size: 22px; /* Subtitle slightly bigger */
}

/* Main headings on page */
h3 {
    font-size: 32px; /* Bigger h3 headings */
    font-weight: 600;
}

/* Example images row */
.examples {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    margin: 20px;
}

.examples img {
    width: 90px; /* bigger animal example images */
    height: 90px;
    border-radius: 15px;
    object-fit: cover;
}

/* Section title */
.section-title {
    font-size: 36px; /* Slightly bigger section title */
    margin-top: 20px;
}

/* Products */
.products {
    display: flex;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
    margin-top: 20px;
}

.product img {
    width: 150px; /* bigger product images */
    height: 150px;
    border-radius: 20px;
    object-fit: cover;
}

.product p {
    margin-top: 10px;
}

/* Big text */
.big-text {
    font-size: 40px; /* Bigger big text */
    font-weight: 600;
    margin: 20px 0;
}

/* Buttons */
.btn {
    display: inline-block;
    padding: 15px 25px; /* Slightly bigger buttons */
    margin: 10px;
    border-radius: 25px;
    color: white;
    text-decoration: none;
    font-weight: 600;
    font-family: 'Lexend', sans-serif;
}

/* Button colors */
.messenger {
    background: #0084ff;
}

.facebook {
    background: #1877f2;
}

/* Email text */
.email {
    margin-top: 15px;
    font-size: 18px;
}

.email a {
    color: #ffffff;
    text-decoration: none;
    font-family: 'Lexend', sans-serif;
    font-weight: 600;
}

/* Feedback section */
.feedback-section {
    margin-top: 50px;
    padding: 20px;
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
    width: 90%;
    max-width: 500px;
    margin-left:auto;
    margin-right:auto;
}

.feedback-section h3 {
    margin-bottom: 15px;
    font-size: 28px;
}

.feedback-section input[type="text"] {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    font-family: 'Lexend', sans-serif;
    font-weight: 600;
    margin-bottom: 10px;
}

.feedback-section button {
    padding: 12px 25px;
    border-radius: 25px;
    border: none;
    background:#0084ff;
    color:white;
    font-family: 'Lexend', sans-serif;
    font-weight: 600;
    cursor:pointer;
}
</style>

</head>
<body>

<!-- Header -->
<div class="header">
    <h1>3D HOUSE</h1>
    <p>Where YOUR prints come to life!</p>
</div>

<h3>Examples of what we print!</h3>

<!-- Small Images -->
<div class="examples">
    <img src="dog.jpg">
    <img src="cat.jpg">
    <img src="snail.jpg">
    <img src="seal.jpg">
    <img src="axolotl.jpg">
</div>

<h2 class="section-title">Animals</h2>

<!-- Products -->
<div class="products">
    <div class="product">
        <img src="stand.jpg">
        <p>Headphone Stands</p>
    </div>

    <div class="product">
        <img src="shelf.jpg">
        <p>Mini Shelves</p>
    </div>

    <div class="product">
        <img src="oreo.jpg">
        <p>Magnet Fidgets</p>
    </div>
</div>

<div class="big-text">And More!</div>

<h3>CREATE YOUR 3D PRINT HERE!</h3>
<p>Contact us here!<br>And get your prints!</p>

<a href="https://www.messenger.com/t/25751000994498733/" target="_blank" class="btn messenger">Messenger</a>
<a href="https://www.facebook.com/profile.php?id=61582165801375" target="_blank" class="btn facebook">Facebook</a>

<!-- Updated Email Section -->
<p class="email">
    Gmail: <a href="https://mail.google.com/mail/?view=cm&fs=1&to=konstantinezedgina@gmail.com" target="_blank">konstantinezedgina@gmail.com</a><br>
    <a href="https://mail.google.com/mail/?view=cm&fs=1&to=demezedginidze@gmail.com" target="_blank">demezedginidze@gmail.com</a>
</p>

<!-- Feedback Section -->
<div class="feedback-section">
    <h3>Feedback</h3>
    
    <!-- Form using Formspree -->
    <form action="https://formspree.io/f/yourformid" method="POST">
        <input type="text" name="message" placeholder="Type your feedback here..." required>
        <button type="submit">Send</button>
    </form>
</div>

</body>
</html>
