<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D House</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #2c2c2c, #000);
    color: white;
    text-align: center;
}

/* Header */
.header {
    margin-top: 30px;
}

.header h1 {
    margin: 5px;
}

.header p {
    margin: 5px;
}

/* Example images row */
.examples {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    margin: 20px;
}

.examples img {
    width: 70px;
    height: 70px;
    border-radius: 15px;
    object-fit: cover;
}

/* Section title */
.section-title {
    font-size: 28px;
    margin-top: 20px;
}

/* Products */
.products {
    display: flex;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
    margin-top: 20px;
}

.product img {
    width: 120px;
    height: 120px;
    border-radius: 20px;
    object-fit: cover;
}

.product p {
    margin-top: 10px;
}

/* Big text */
.big-text {
    font-size: 32px;
    font-weight: bold;
    margin: 20px 0;
}

/* Buttons */
.btn {
    display: inline-block;
    padding: 12px 20px;
    margin: 10px;
    border-radius: 25px;
    color: white;
    text-decoration: none;
    font-weight: bold;
}

.messenger {
    background: #0084ff;
}

.facebook {
    background: #1877f2;
}

/* Email text */
.email {
    margin-top: 15px;
    font-size: 18px;
}

.email a {
    color: #ffffff;
    text-decoration: none;
}
</style>

</head>
<body>

<!-- Header -->
<div class="header">
    <h1>3D HOUSE</h1>
    <p>Where YOUR prints come to life!</p>
</div>

<h3>Examples of what we print!</h3>

<!-- Small Images -->
<div class="examples">
    <img src="dog.jpg">
    <img src="cat.jpg">
    <img src="snail.jpg">
    <img src="seal.jpg">
    <img src="axolotl.jpg">
</div>

<h2 class="section-title">Animals</h2>

<!-- Products -->
<div class="products">
    <div class="product">
        <img src="stand.jpg">
        <p>Headphone Stands</p>
    </div>

    <div class="product">
        <img src="shelf.jpg">
        <p>Mini Shelves</p>
    </div>

    <div class="product">
        <img src="oreo.jpg">
        <p>Magnet Fidgets</p>
    </div>
</div>

<div class="big-text">And More!</div>

<h3>CREATE YOUR 3D PRINT HERE!</h3>
<p>Contact us here!<br>And get your prints!</p>

<a href="https://m.me/YOURUSERNAME" target="_blank" class="btn messenger">Messenger</a>
<a href="https://www.facebook.com/YOURPAGE" target="_blank" class="btn facebook">Facebook</a>

<p class="email">
    Gmail: <a href="mailto:konstantinezedgina@gmail.com">konstantinezedgina@gmail.com</a>
</p>

</body>
</html>
