<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D House</title>
    <!-- Google Fonts Exo 2 -->
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Exo 2', sans-serif;
        }

        body, html {
            height: 100%;
        }

        /* Homepage Styles */
        .home {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            overflow: hidden;
        }

        /* Darkened video background */
        .home video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(40%);
            z-index: -1;
        }

        .logo {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.6);
        }

        .tagline {
            font-size: 24px;
            margin-bottom: 30px;
            text-shadow: 1px 1px 6px rgba(0,0,0,0.5);
        }

        .button {
            display: inline-flex;
            align-items: center;
            padding: 12px 20px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
            margin-bottom: 15px;
        }

        .shop-button {
            background-color: rgba(0, 128, 0, 0.85);
            color: white;
        }

        .shop-button:hover {
            background-color: rgba(0, 150, 0, 0.95);
        }

        .shop-button img {
            width: 24px;
            height: 24px;
            margin-right: 10px;
        }

        .contact-button {
            background-color: rgba(59, 89, 152, 0.9);
            color: white;
        }

        .contact-button img {
            width: 20px;
            height: 20px;
            margin-right: 8px;
        }

        .contact-button:hover {
            background-color: rgba(59, 89, 152, 1);
        }

        /* Shop Page Styles */
        .shop-page {
            padding: 50px 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            background-color: #f5f5f5;
        }

        .product-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.3s;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .product-title {
            padding: 15px;
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        a {
            text-decoration: none;
            color: inherit;
        }
    </style>
</head>
<body>

    <!-- Homepage -->
    <div class="home" id="home">
        <video autoplay muted loop>
            <source src="https://cdn.videvo.net/videvo_files/video/free/2021-09/large_watermarked/3d_printer_preview_1080p_1302_preview.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <div class="logo">3D House</div>
        <div class="tagline">Where your prints come to life!</div>
        <!-- Shop button -->
        <a href="https://your-shop-link.com" class="button shop-button" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/263/263142.png" alt="Shopping Cart Icon">
            Shop
        </a>
        <!-- Facebook Contact button -->
        <a href="https://facebook.com/yourpage" class="button contact-button" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook Logo">
            Contact
        </a>
    </div>

    <!-- Shop Page -->
    <div class="shop-page" id="shop">
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1593642634367-d91a135587b5?auto=format&fit=crop&w=400&q=80" alt="Product 1">
            <div class="product-title">Project One</div>
        </div>
    </div>

</body>
</html>
